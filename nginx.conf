worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Rate limiting (10 istek / saniye / IP)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Backend hedefi (Load balancer)
    upstream ringtone_backend {
        # PM2 cluster mode olduğu sürece tek port yeterlidir
        server 127.0.0.1:5000;
        # server 10.0.0.2:5000; # Eğer ayrı bir sunucu varsa
    }

    server {
        listen 80;
        server_name api.yourdomain.com; # Kendi domaininizi yazın

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Eğer Cloudflare kullanıyorsanız gerçek ziyaretçi IP'sini almak için
        # set_real_ip_from 173.245.48.0/20;
        # set_real_ip_from 103.21.244.0/22;
        # real_ip_header CF-Connecting-IP;

        # Temel yük yönlendirmesi
        location / {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://ringtone_backend;
        }

        # Sadece izin verilen limit kontrolü
        location /health {
            proxy_pass http://ringtone_backend/health;
        }
    }
}
